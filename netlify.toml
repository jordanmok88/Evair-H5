[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Edge functions run on Deno Deploy in front of the CDN. Used here
# for per-route OG / Twitter Card rewriting so social scrapers
# (Twitter, Slack, iMessage, Facebook, LinkedIn) get correct link
# previews — the SPA's client-side <title>/meta updates don't reach
# them. See netlify/edge-functions/og-rewriter.ts for details.
[[edge_functions]]
  function = "og-rewriter"
  path = "/help"

[[edge_functions]]
  function = "og-rewriter"
  path = "/help/*"

[[edge_functions]]
  function = "og-rewriter"
  path = "/blog"

[[edge_functions]]
  function = "og-rewriter"
  path = "/blog/*"

[[edge_functions]]
  function = "og-rewriter"
  path = "/travel-esim"

[[edge_functions]]
  function = "og-rewriter"
  path = "/travel-esim/*"

[[edge_functions]]
  function = "og-rewriter"
  path = "/sim/*"

[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/esim"
  to = "/.netlify/functions/esim"
  status = 200

[[redirects]]
  from = "/api/stripe-checkout"
  to = "/.netlify/functions/stripe-checkout"
  status = 200

[[redirects]]
  from = "/api/stripe-verify"
  to = "/.netlify/functions/stripe-verify"
  status = 200

[[redirects]]
  from = "/r"
  to = "/.netlify/functions/qr-scan"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
