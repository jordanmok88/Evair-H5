[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/esim"
  to = "/.netlify/functions/esim"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
