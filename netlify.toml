[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

# Edge: 301 prod Netlify subdomain → www (before other edge logic).
# Preview deploy hostnames (*.netlify.app with extra segment) are unaffected.
[[edge_functions]]
  function = "staging-robots"
  path = "/*"

# Edge functions run on Deno Deploy in front of the CDN.
# For per-route OG / Twitter Card rewriting so social scrapers
# (Twitter, Slack, iMessage, Facebook, LinkedIn) get correct link
# previews — the SPA's client-side <title>/meta updates don't reach
# them. See netlify/edge-functions/og-rewriter.ts for details.
[[edge_functions]]
  function = "og-rewriter"
  path = "/help"

[[edge_functions]]
  function = "og-rewriter"
  path = "/help/*"

[[edge_functions]]
  function = "og-rewriter"
  path = "/blog"

[[edge_functions]]
  function = "og-rewriter"
  path = "/blog/*"

[[edge_functions]]
  function = "og-rewriter"
  path = "/travel-esim"

[[edge_functions]]
  function = "og-rewriter"
  path = "/travel-esim/*"

[[edge_functions]]
  function = "og-rewriter"
  path = "/sim/*"

[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/esim"
  to = "/.netlify/functions/esim"
  status = 200

[[redirects]]
  from = "/api/stripe-checkout"
  to = "/.netlify/functions/stripe-checkout"
  status = 200

[[redirects]]
  from = "/api/stripe-verify"
  to = "/.netlify/functions/stripe-verify"
  status = 200

[[redirects]]
  from = "/r"
  to = "/.netlify/functions/qr-scan"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Content-Security-Policy — defer until script/connect/frame-src allowlist passes QA (Stripe, Laravel API, WS, CDN).

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(self https://js.stripe.com https://hooks.stripe.com), usb=()"
