<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#F2F4F7" />
    <title>EvairSIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                orange: '#FF6600', // Primary: CTA, Active Tabs
                red: '#CC0000',    // Secondary: Urgent, Sale
                yellow: '#FFCC33', // Highlight: Decor
              },
              slate: {
                850: '#1e293b',
              }
            }
          }
        }
      }
    </script>
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        -webkit-tap-highlight-color: transparent;
        background-color: #F2F4F7;
        overscroll-behavior: none;
      }
      /* Safe area top padding: real inset on mobile, fixed for desktop frame */
      .pt-safe {
        padding-top: max(env(safe-area-inset-top, 0px), 8px);
      }
      @media (min-width: 768px) {
        .pt-safe {
          padding-top: 3.5rem;
        }
      }
      /* Standalone PWA: status bar overlays content, needs safe area */
      @media all and (display-mode: standalone) {
        .pt-safe {
          padding-top: env(safe-area-inset-top, 20px);
        }
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>
