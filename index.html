    <!-- JSON-LD: FAQ (common questions → featured snippet potential) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is an eSIM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An eSIM (embedded SIM) is a digital SIM that lets you activate a mobile data plan without a physical SIM card. Simply scan a QR code on your mobile and connect instantly — perfect for international travel."
          }
        },
        {
          "@type": "Question",
          "name": "How do I install an eSIM from EvairSIM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After purchasing, you'll receive a QR code. Go to your mobile's Settings → Cellular → Add eSIM → Scan QR Code. The eSIM activates automatically when you arrive at your destination."
          }
        },
        {
          "@type": "Question",
          "name": "Which countries does EvairSIM cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EvairSIM offers data plans for over 190 countries and regions worldwide, including the USA, Japan, Thailand, South Korea, UK, France, Australia, and many more."
          }
        },

          "@type": "Question",
          "name": "Can I top up my eSIM data plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Most EvairSIM plans are reloadable. You can top up your data directly in the app without needing a new eSIM or QR code."

        }
